<title>BVP OTR Rate Estimator | Bridge View Paper</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  :root {
    --bg:           #F4F6F9;
    --bg-panel:     #FFFFFF;
    --bg-raised:    #F0F3F7;
    --bg-input:     #FFFFFF;
    --border:       #DDE3EC;
    --border-focus: #1A7A50;
    --text-1:       #111827;
    --text-2:       #4B5E73;
    --text-3:       #8CA0B5;
    --green-deep:   #0D3326;
    --green-mid:    #155C3E;
    --green-bright: #1A7A50;
    --green-acc:    #22A06B;
    --green-glow:   rgba(34,160,107,0.12);
    --green-border: rgba(34,160,107,0.3);
    --teal:         #0EA5A0;
    --amber:        #D97706;
    --red:          #DC2626;
    --shadow:       0 1px 4px rgba(0,0,0,0.08);
    --shadow-lg:    0 4px 24px rgba(0,0,0,0.10);
    --nav-bg:       rgba(255,255,255,0.95);
  }


  /* DARK MODE */
  html.dark {
    --bg:           #0B1620;
    --bg-panel:     #162638;
    --bg-raised:    #1C3044;
    --bg-input:     #0C1C2C;
    --border:       #243D57;
    --border-focus: #22A06B;
    --text-1:       #EDF2F8;
    --text-2:       #7FA0BC;
    --text-3:       #4A6A85;
    --shadow:       0 1px 4px rgba(0,0,0,0.3);
    --shadow-lg:    0 4px 24px rgba(0,0,0,0.4);
    --nav-bg:       rgba(11,22,32,0.95);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    transition: background 0.3s, color 0.3s;
    color: var(--text-1);
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NAV */
  .topnav {
    position: sticky; top: 0; z-index: 100;
    background: var(--nav-bg);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
    box-shadow: var(--shadow);
  }
  .nav-brand { display: flex; align-items: center; gap: 12px; }
  .nav-logo {
    width: 44px; height: 44px;
    border-radius: 10px;
    overflow: hidden; flex-shrink: 0;
    border: 1.5px solid var(--green-border);
  }
  .nav-logo img { width: 100%; height: 100%; object-fit: contain; background: #fff; }
  .nav-divider { width: 1px; height: 22px; background: var(--border); }
  .nav-name { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; color: var(--text-1); }
  .nav-tool { font-size: 12px; color: var(--text-2); }
  .nav-right { display: flex; align-items: center; gap: 10px; }
  .badge-internal {
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--green-acc); border: 1px solid var(--green-border);
    background: var(--green-glow); border-radius: 4px; padding: 3px 9px;
  }

  /* HERO */
  .hero { text-align: center; padding: 36px 20px 28px; }
  .hero-logo {
    width: 110px; height: 110px; margin: 0 auto 20px;
    border-radius: 16px; overflow: hidden;
    box-shadow: 0 4px 20px rgba(34,160,107,0.2);
    background: #fff;
    border: 1.5px solid var(--green-border);
  }
  .hero-logo img { width: 100%; height: 100%; object-fit: contain; }
  .hero-eyebrow {
    font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--green-acc); margin-bottom: 8px;
  }
  .hero-title {
    font-size: 32px; font-weight: 800; letter-spacing: -0.04em;
    line-height: 1.1; color: var(--text-1); margin-bottom: 14px;
  }
  .hero-title span { color: var(--green-acc); }
  .hero-meta {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 12px; color: var(--text-2);
    background: var(--bg-panel); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 14px;
    box-shadow: var(--shadow);
  }
  .hero-meta-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green-acc); }

  /* MAIN */
  .main { max-width: 860px; margin: 0 auto; padding: 0 16px 80px; }

  /* SECTION HDR */
  .section-hdr {
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-3); padding-bottom: 10px; border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }

  /* CARD */
  .card {
    background: var(--bg-panel); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px; margin-bottom: 20px;
    box-shadow: var(--shadow-lg);
  }

  /* ROUTE ROW */
  .route-row {
    display: grid; grid-template-columns: 1fr 44px 1fr;
    gap: 12px; align-items: end; margin-bottom: 20px;
  }
  .route-arrow-wrap {
    display: flex; align-items: center; justify-content: center;
    height: 46px; color: var(--green-acc);
  }
  .route-arrow-wrap svg { width: 20px; height: 20px; }

  /* FIELD */
  .field { display: flex; flex-direction: column; gap: 7px; }
  .field-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-2);
  }
  .field-label svg { width: 12px; height: 12px; color: var(--green-acc); }
  .field-row { display: flex; align-items: flex-start; gap: 8px; }
  .pin-icon {
    width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0; margin-top: 9px;
    display: flex; align-items: center; justify-content: center;
  }
  .pin-icon.origin { background: var(--green-glow); }
  .pin-icon.dest   { background: rgba(217,119,6,0.1); }
  .pin-icon svg { width: 13px; height: 13px; }
  .pin-icon.origin svg { color: var(--green-acc); }
  .pin-icon.dest svg   { color: var(--amber); }

  textarea, select {
    background: var(--bg-input); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text-1);
    font-family: inherit; font-size: 14px; padding: 11px 14px;
    width: 100%; outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    -webkit-appearance: none;
  }
  textarea { resize: none; height: 62px; line-height: 1.5; }
  textarea:focus, select:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px var(--green-glow);
  }

  /* CALC BUTTON */
  .btn-calc {
    width: 100%; margin-top: 20px;
    background: linear-gradient(135deg, var(--green-bright), var(--green-mid));
    border: none; border-radius: 10px; color: #fff;
    font-family: inherit; font-size: 16px; font-weight: 700;
    padding: 16px; cursor: pointer; letter-spacing: 0.02em;
    display: flex; align-items: center; justify-content: center; gap: 9px;
    box-shadow: 0 4px 20px rgba(26,122,80,0.3);
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .btn-calc:hover { filter: brightness(1.08); }
  .btn-calc:active { transform: scale(0.99); }
  .btn-calc:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }
  .btn-calc svg { width: 18px; height: 18px; }

  /* LOADING */
  .loading-wrap {
    text-align: center; padding: 48px 0;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .truck-anim {
    width: 64px; height: 64px;
    background: var(--bg-raised); border: 1px solid var(--border);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    animation: tpulse 1.2s ease-in-out infinite;
  }
  .truck-anim svg { width: 32px; height: 32px; color: var(--green-acc); }
  @keyframes tpulse { 0%,100%{opacity:.5;transform:scale(.95)} 50%{opacity:1;transform:scale(1.05)} }
  .loading-wrap p { font-size: 14px; color: var(--text-2); }
  .loading-dots span {
    display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    background: var(--green-acc); margin: 0 2px;
    animation: dbounce 1.2s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay:.2s }
  .loading-dots span:nth-child(3) { animation-delay:.4s }
  @keyframes dbounce { 0%,100%{opacity:.2;transform:translateY(0)} 50%{opacity:1;transform:translateY(-4px)} }

  /* RESULTS */
  #results { margin-top: 8px; }
  .result-hdr-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .result-route {
    font-size: 17px; font-weight: 700; letter-spacing: -0.02em;
    color: var(--text-1); flex: 1; min-width: 0;
  }
  .result-route .arr { color: var(--green-acc); margin: 0 5px; }
  .market-badge {
    font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
    border-radius: 5px; padding: 4px 10px; flex-shrink: 0;
  }
  .m-tight    { background: rgba(220,38,38,0.1); color: var(--red); border: 1px solid rgba(220,38,38,0.3); }
  .m-balanced { background: rgba(217,119,6,0.1); color: var(--amber); border: 1px solid rgba(217,119,6,0.3); }
  .m-soft     { background: var(--green-glow); color: var(--green-acc); border: 1px solid var(--green-border); }

  .kpi-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 18px; }
  .kpi {
    background: var(--bg-raised); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 12px;
  }
  .kpi-lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text-3); margin-bottom: 6px; }
  .kpi-val { font-size: 20px; font-weight: 800; letter-spacing: -0.03em; color: var(--text-1); line-height: 1; }
  .kpi-val.green { color: var(--green-acc); }
  .kpi-val.teal  { color: var(--teal); }
  .kpi-sub { font-size: 11px; color: var(--text-3); margin-top: 5px; }

  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
  .detail-card {
    background: var(--bg-raised); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px;
  }
  .detail-card-title {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-2); padding-bottom: 10px; border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
  }
  .drow {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; padding: 6px 0;
    border-bottom: 1px solid var(--border);
  }
  .drow:last-child { border-bottom: none; }
  .drow .dl { color: var(--text-2); }
  .drow .dv { color: var(--text-1); font-weight: 600; font-variant-numeric: tabular-nums; }
  .drow .dv.g { color: var(--green-acc); }

  .lane-note {
    display: flex; align-items: flex-start; gap: 12px;
    background: var(--green-glow); border: 1px solid var(--green-border);
    border-radius: 10px; padding: 14px 16px; margin-bottom: 18px;
  }
  .lane-note-icon { color: var(--green-acc); flex-shrink: 0; margin-top: 1px; }
  .lane-note-icon svg { width: 16px; height: 16px; }
  .lane-note-txt { font-size: 13px; color: var(--text-2); line-height: 1.6; }

  .disclaimer {
    display: flex; gap: 9px; align-items: flex-start;
    font-size: 11px; color: var(--text-3); line-height: 1.7;
    background: var(--bg-raised); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px;
  }
  .disclaimer svg { width: 13px; height: 13px; flex-shrink: 0; margin-top: 1px; color: var(--text-3); }

  .error-box {
    display: flex; gap: 10px; align-items: flex-start;
    background: rgba(220,38,38,0.07); border: 1px solid rgba(220,38,38,0.25);
    border-radius: 10px; padding: 16px 18px; color: var(--red); font-size: 13px;
    margin-top: 12px; line-height: 1.6;
  }
  .error-box svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }



  .footer {
    text-align: center; font-size: 11px; color: var(--text-3);
    padding: 20px 16px; border-top: 1px solid var(--border);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  @media (max-width: 480px) {
    .footer { font-size: 10px; padding: 16px 10px; letter-spacing: -0.01em; }
  }

  /* MOBILE */
  @media (max-width: 600px) {
    .topnav { padding: 0 14px; height: 58px; }
    .nav-name { font-size: 13px; }
    .nav-tool { display: none; }
    .badge-internal { display: none; }
    .hero { padding: 24px 16px 20px; }
    .hero-logo { width: 88px; height: 88px; }
    .hero-title { font-size: 26px; }
    .main { padding: 0 12px 80px; }
    .card { padding: 16px; }
    .route-row { grid-template-columns: 1fr 36px 1fr; gap: 8px; }
    .kpi-grid { grid-template-columns: repeat(2,1fr); }
    .detail-grid { grid-template-columns: 1fr; }
    .result-route { font-size: 14px; }
    .modal { padding: 20px; }
    .rates-tbl th:nth-child(2), .rates-tbl td:nth-child(2) { display: none; }
  }
  @media (max-width: 380px) {
    .route-row { grid-template-columns: 1fr; gap: 10px; }
    .route-arrow-wrap { height: 20px; transform: rotate(90deg); }
    .hero-title { font-size: 22px; }
  }
</style>
</head>

  </div>

  <div id="results"></div>

</main>

<footer class="footer">
  Bridge View Paper &nbsp;·&nbsp; Internal Use Only &nbsp;·&nbsp; OTR Freight Rate Estimator &nbsp;·&nbsp; v4.0 &nbsp;·&nbsp; <span id="mwCredit" style="cursor:default;user-select:none;">●</span>
</footer>


<script>
// ── RATES ──
const DEFAULTS = {
  r_low: 1.85, r_mid: 2.20, r_high: 2.60,
  r_fsc_low: 0.38, r_fsc_high: 0.55,
  lastUpdated: 'June 2026'
};

function loadRates() {
  try { return JSON.parse(localStorage.getItem('bvp_rates') || 'null') || {...DEFAULTS}; }
  catch { return {...DEFAULTS}; }
}



// ── INIT ──
// DARK MODE — triple-click logo
let clickCount = 0, clickTimer = null;
function handleLogoClick() {
  clickCount++;
  clearTimeout(clickTimer);
  clickTimer = setTimeout(() => {
    if (clickCount >= 3) {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('bvp_dark', document.documentElement.classList.contains('dark') ? '1' : '0');
    }
    clickCount = 0;
  }, 500);
}
document.getElementById('logoClick').addEventListener('click', handleLogoClick);
document.getElementById('heroLogo').addEventListener('click', handleLogoClick);

window.addEventListener('DOMContentLoaded', () => {
  if (localStorage.getItem('bvp_dark') === '1') document.documentElement.classList.add('dark');
  const r = loadRates();
  document.getElementById('updatedLabel').textContent = r.lastUpdated || 'Not set';
});

// ── REGION MAP ──
// Maps state abbreviations to broad freight regions
const STATE_REGION = {
  ME:'Northeast', NH:'Northeast', VT:'Northeast', MA:'Northeast', RI:'Northeast',
  CT:'Northeast', NY:'Northeast', NJ:'Northeast', PA:'Northeast', DE:'Northeast', MD:'Northeast',
  VA:'Southeast', WV:'Southeast', NC:'Southeast', SC:'Southeast', GA:'Southeast',
  FL:'Southeast', AL:'Southeast', MS:'Southeast', TN:'Southeast', KY:'Southeast',
  OH:'Midwest', IN:'Midwest', MI:'Midwest', WI:'Midwest', IL:'Midwest',
  MN:'Midwest', IA:'Midwest', MO:'Midwest',
  ND:'Plains', SD:'Plains', NE:'Plains', KS:'Plains', OK:'Plains',
  AR:'South', LA:'South', TX:'South',
  MT:'Mountain', ID:'Mountain', WY:'Mountain', CO:'Mountain', UT:'Mountain',
  NV:'Mountain', AZ:'Southwest', NM:'Southwest',
  WA:'PNW', OR:'PNW', CA:'WestCoast',
  AK:'Alaska', HI:'Hawaii'
};

// Approximate center lat/lng per state for distance estimation
const STATE_COORDS = {
  ME:[45.2,-69.0], NH:[43.7,-71.6], VT:[44.0,-72.7], MA:[42.4,-71.4], RI:[41.7,-71.5],
  CT:[41.6,-72.7], NY:[42.9,-75.5], NJ:[40.1,-74.7], PA:[40.9,-77.8], DE:[39.0,-75.5],
  MD:[39.0,-76.8], VA:[37.8,-79.5], WV:[38.6,-80.5], NC:[35.6,-79.4], SC:[33.9,-81.0],
  GA:[32.7,-83.4], FL:[28.6,-82.5], AL:[32.8,-86.8], MS:[32.7,-89.7], TN:[35.9,-86.3],
  KY:[37.5,-85.3], OH:[40.4,-82.8], IN:[39.9,-86.3], MI:[43.3,-84.5], WI:[44.3,-89.8],
  IL:[40.1,-89.3], MN:[46.4,-93.1], IA:[42.1,-93.5], MO:[38.5,-92.5],
  ND:[47.5,-100.5], SD:[44.4,-100.3], NE:[41.5,-99.8], KS:[38.7,-98.4], OK:[35.6,-97.5],
  AR:[34.8,-92.2], LA:[31.2,-92.1], TX:[31.5,-99.3],
  MT:[46.9,-110.4], ID:[44.4,-114.6], WY:[43.0,-107.6], CO:[39.0,-105.5], UT:[39.3,-111.1],
  NV:[38.5,-117.1], AZ:[34.3,-111.7], NM:[34.5,-106.2],
  WA:[47.4,-120.5], OR:[44.0,-120.5], CA:[36.8,-119.4]
};

// Parse state from freetext input
function parseState(text) {
  const t = text.toUpperCase().trim();
  // Full state names
  const names = {
    'ALABAMA':'AL','ALASKA':'AK','ARIZONA':'AZ','ARKANSAS':'AR','CALIFORNIA':'CA',
    'COLORADO':'CO','CONNECTICUT':'CT','DELAWARE':'DE','FLORIDA':'FL','GEORGIA':'GA',
    'HAWAII':'HI','IDAHO':'ID','ILLINOIS':'IL','INDIANA':'IN','IOWA':'IA',
    'KANSAS':'KS','KENTUCKY':'KY','LOUISIANA':'LA','MAINE':'ME','MARYLAND':'MD',
    'MASSACHUSETTS':'MA','MICHIGAN':'MI','MINNESOTA':'MN','MISSISSIPPI':'MS','MISSOURI':'MO',
    'MONTANA':'MT','NEBRASKA':'NE','NEVADA':'NV','NEW HAMPSHIRE':'NH','NEW JERSEY':'NJ',
    'NEW MEXICO':'NM','NEW YORK':'NY','NORTH CAROLINA':'NC','NORTH DAKOTA':'ND','OHIO':'OH',
    'OKLAHOMA':'OK','OREGON':'OR','PENNSYLVANIA':'PA','RHODE ISLAND':'RI','SOUTH CAROLINA':'SC',
    'SOUTH DAKOTA':'SD','TENNESSEE':'TN','TEXAS':'TX','UTAH':'UT','VERMONT':'VT',
    'VIRGINIA':'VA','WASHINGTON':'WA','WEST VIRGINIA':'WV','WISCONSIN':'WI','WYOMING':'WY'
  };
  for (const [name, abbr] of Object.entries(names)) {
    if (t.includes(name)) return abbr;
  }
  // Abbreviation match (last 2-letter word)
  const words = t.replace(/[^A-Z ]/g,' ').trim().split(/\s+/);
  for (let i = words.length-1; i >= 0; i--) {
    if (words[i].length === 2 && STATE_COORDS[words[i]]) return words[i];
  }
  return null;
}

function cityLabel(text) {
  return text.trim().split(',')[0].trim().replace(/\n/g,' ').split('\n')[0].trim();
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 3958.8;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
};

// Market condition by region pair (from→to)
function getMarketCondition(fromRegion, toRegion) {
  // Headhaul/tight lanes
  const tight = [
    ['Northeast','WestCoast'],['Northeast','PNW'],['Midwest','WestCoast'],
    ['Plains','WestCoast'],['South','WestCoast'],['Southeast','WestCoast'],
    ['Northeast','Mountain'],['Midwest','PNW']
  ];
  // Backhaul/soft lanes
  const soft = [
    ['WestCoast','Northeast'],['WestCoast','Midwest'],['WestCoast','Southeast'],
    ['PNW','Northeast'],['PNW','Midwest'],['Southeast','South'],
    ['Southeast','Southeast'],['South','Southeast']
  ];
  for (const [a,b] of tight) if (a===fromRegion && b===toRegion) return 'Tight';
  for (const [a,b] of soft)  if (a===fromRegion && b===toRegion) return 'Soft';
  return 'Balanced';
}

function transitDays(miles) {
  if (miles < 300)  return '1 business day';
  if (miles < 700)  return '1–2 business days';
  if (miles < 1200) return '2–3 business days';
  if (miles < 1800) return '3–4 business days';
  if (miles < 2500) return '4–5 business days';
  return '5–6 business days';
}

function laneNote(fromRegion, toRegion, market) {
  const notes = {
    'Tight':    'This is a carrier-favorable headhaul lane — capacity is tighter and rates tend to run at or above the high benchmark.',
    'Soft':     'This is a backhaul lane with strong carrier availability — rates typically come in near or below the low benchmark.',
    'Balanced': 'This is a balanced lane with good bidirectional freight flow — rates should land within the standard benchmark range.'
  };
  const specific = {
    'Northeast:WestCoast': 'Long-haul Northeast to West Coast is a classic headhaul with limited backhaul options; expect premium pricing.',
    'South:WestCoast': 'Texas to California is highly competitive — demand from auto and retail freight keeps rates elevated.',
    'Southeast:Southeast': 'Intra-Southeast lanes are generally soft with abundant capacity and favorable spot rates.',
    'Northeast:South': 'Northeast to South Texas (Laredo/El Paso) is a busy lane driven by cross-border trade activity.',
    'Midwest:WestCoast': 'Midwest to West Coast is a strong headhaul lane with limited return freight; budget at the high end.',
  };
  const key = `${fromRegion}:${toRegion}`;
  return specific[key] || notes[market] || notes['Balanced'];
}

// ── CALCULATE ──
function calculate() {
  const originRaw = document.getElementById('origin').value.trim();
  const destRaw   = document.getElementById('dest').value.trim();
  const btn       = document.getElementById('calcBtn');
  const results   = document.getElementById('results');

  if (!originRaw || !destRaw) {
    results.innerHTML = `<div class="error-box"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Please enter both a pickup and delivery location.</div>`;
    return;
  }

  const originState = parseState(originRaw);
  const destState   = parseState(destRaw);

  if (!originState || !STATE_COORDS[originState]) {
    results.innerHTML = `<div class="error-box"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div>Couldn't identify the <strong>pickup</strong> state. Try entering as "City, ST" (e.g. "Blue Bell, PA").</div></div>`;
    return;
  }
  if (!destState || !STATE_COORDS[destState]) {
    results.innerHTML = `<div class="error-box"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div>Couldn't identify the <strong>delivery</strong> state. Try entering as "City, ST" (e.g. "Laredo, TX").</div></div>`;
    return;
  }

  btn.disabled = true;
  results.innerHTML = `
    <div class="loading-wrap">
      <div class="truck-anim">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 4v4h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
      </div>
      <p>Calculating lane rate estimate…</p>
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>`;

  setTimeout(() => {
    const r = loadRates();
    const [oLat, oLon] = STATE_COORDS[originState];
    const [dLat, dLon] = STATE_COORDS[destState];
    const asMiles = haversine(oLat, oLon, dLat, dLon);
    // Road miles ~30% longer than straight-line
    const miles = Math.round(asMiles * 1.20);

    const fromRegion = STATE_REGION[originState] || 'Midwest';
    const toRegion   = STATE_REGION[destState]   || 'Midwest';
    const market     = getMarketCondition(fromRegion, toRegion);

    const rateBase  = market === 'Tight' ? r.r_high : market === 'Soft' ? r.r_low : r.r_mid;
    const rateLow   = r.r_low;
    const rateHigh  = r.r_high;

    const llLow  = Math.round(rateLow  * miles);
    const llHigh = Math.round(rateHigh * miles);
    const fscLow  = Math.round(r.r_fsc_low  * miles);
    const fscHigh = Math.round(r.r_fsc_high * miles);
    const totLow  = llLow  + fscLow;
    const totHigh = llHigh + fscHigh;
    const rpmLow  = (totLow  / miles).toFixed(2);
    const rpmHigh = (totHigh / miles).toFixed(2);

    const mClass = market === 'Tight' ? 'm-tight' : market === 'Soft' ? 'm-soft' : 'm-balanced';
    const originCity = cityLabel(originRaw);
    const destCity   = cityLabel(destRaw);
    const transit    = transitDays(miles);
    const note       = laneNote(fromRegion, toRegion, market);

    results.innerHTML = `
      <div class="card">
        <div class="result-hdr-row">
          <div class="result-route">
            ${originCity}, ${originState}<span class="arr">→</span>${destCity}, ${destState}
          </div>
          <span class="market-badge ${mClass}">${market} Market</span>
        </div>

        <div class="kpi-grid">
          <div class="kpi">
            <div class="kpi-lbl">Est. Miles</div>
            <div class="kpi-val">${Number(miles).toLocaleString()}<span style="font-size:13px;font-weight:400;color:var(--text-3);"> mi</span></div>
            <div class="kpi-sub">${fromRegion} → ${toRegion}</div>
          </div>
          <div class="kpi">
            <div class="kpi-lbl">Transit Time</div>
            <div class="kpi-val" style="font-size:16px;line-height:1.2;">${transit}</div>
            <div class="kpi-sub">FTL · Standard</div>
          </div>
          <div class="kpi">
            <div class="kpi-lbl">Rate — Low</div>
            <div class="kpi-val teal">$${Number(totLow).toLocaleString()}</div>
            <div class="kpi-sub">$${rpmLow}/mi all-in</div>
          </div>
          <div class="kpi">
            <div class="kpi-lbl">Rate — High</div>
            <div class="kpi-val green">$${Number(totHigh).toLocaleString()}</div>
            <div class="kpi-sub">$${rpmHigh}/mi all-in</div>
          </div>
        </div>

        <div class="detail-grid">
          <div class="detail-card">
            <div class="detail-card-title">Rate Breakdown</div>
            <div class="drow"><span class="dl">Linehaul — Low</span><span class="dv">$${Number(llLow).toLocaleString()}</span></div>
            <div class="drow"><span class="dl">Linehaul — High</span><span class="dv">$${Number(llHigh).toLocaleString()}</span></div>
            <div class="drow"><span class="dl">Fuel Surcharge — Low</span><span class="dv">$${Number(fscLow).toLocaleString()}</span></div>
            <div class="drow"><span class="dl">Fuel Surcharge — High</span><span class="dv">$${Number(fscHigh).toLocaleString()}</span></div>
            <div class="drow"><span class="dl">All-In Range</span><span class="dv g">$${Number(totLow).toLocaleString()} – $${Number(totHigh).toLocaleString()}</span></div>
          </div>
          <div class="detail-card">
            <div class="detail-card-title">Lane Details</div>
            <div class="drow"><span class="dl">Load Type</span><span class="dv">Full Truckload</span></div>
            <div class="drow"><span class="dl">Commodity</span><span class="dv">Paper / Packaging</span></div>
            <div class="drow"><span class="dl">Service</span><span class="dv">Standard Transit</span></div>
            <div class="drow"><span class="dl">Rate Base — Low</span><span class="dv">$${r.r_low.toFixed(2)}/mi</span></div>
            <div class="drow"><span class="dl">Rate Base — High</span><span class="dv">$${r.r_high.toFixed(2)}/mi</span></div>
          </div>
        </div>

        <div class="lane-note">
          <div class="lane-note-icon"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></div>
          <div class="lane-note-txt"><strong>Lane Intelligence:</strong> ${note}</div>
        </div>

        <div class="disclaimer">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Estimates use BVP's internal benchmarks and national dry van averages. Mileage based on state-center approximations. Actual rates vary with fuel, accessorials, zip codes, and real-time market conditions. Confirm with your broker before booking. Internal use only.
        </div>
      </div>`;

    btn.disabled = false;
  }, 600);
}

// MW Easter egg
let mwClicks = 0, mwTimer = null;
document.getElementById('mwCredit').addEventListener('click', function() {
  mwClicks++;
  clearTimeout(mwTimer);
  mwTimer = setTimeout(() => {
    if (mwClicks >= 3) {
      this.textContent = 'MW';
      this.style.color = 'var(--green-acc)';
      this.style.fontWeight = '700';
      setTimeout(() => {
        this.textContent = '●';
        this.style.color = '';
        this.style.fontWeight = '';
      }, 2000);
    }
    mwClicks = 0;
  }, 500);
});
</script>
